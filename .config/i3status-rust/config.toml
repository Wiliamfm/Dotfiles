icons_format = "{icon}"
error_format = "$short_error_message | X"
error_fullscreen_format = "$full_error_message"

[theme]
theme = "dracula"

[icons]
icons = "material-nf"

# BLOCKS

[[block]]
block = "cpu"

[[block]]
block = "disk_space"
path = "/"
alert_unit = "GB"
interval = 60
format = "$icon $path: $available"

[[block]]
block = "memory"
format = "$icon $mem_total_used_percents ($mem_total)"
format_alt = "$icon_swap $swap_used_percents ($swap_total)"

[[block]]
block = "net"
format = "$icon $speed_down.eng(prefix:K) ^icon_net_down $speed_up.eng(prefix:K) ^icon_net_up"
format_alt = "$icon $signal_strength ($ssid) $ip"

[[block]]
block = "sound"
max_vol = 100
[[block.click]]
button = "left"
cmd = "wpctl set-mute @DEFAULT_SINK@ toggle"

[[block]]
block = "backlight"

[[block]]
block = "battery"
format = "$icon $percentage {$time_remaining.dur(hms:true, min_unit:m) |}"

[[block]]
block = "time"
interval = 1
format = "$timestamp.datetime(f:'%a %d/%m %T')"
